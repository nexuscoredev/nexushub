<!DOCTYPE html>
<html lang="pt-BR" data-theme="light" data-theme-mode="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS</title>
  <meta name="description" content="Tecnologia personalizada que se adapta ao seu negócio." />
  <meta property="og:title" content="NEXUS" />
  <meta property="og:image" content="https://nexussystems.dev/img/og-nexus.png" />
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <link rel="apple-touch-icon" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/nexus-site.css" />
  <script src="js/theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.NexusTheme?.initButtons?.();
    });
  </script>
</head>
<body>
  <main class="nx-splash--legacy">
    <div class="nx-splash--legacy__bg" aria-hidden="true">
      <div class="nx-splash--legacy__bg-image"></div>
      <div class="nx-splash--legacy__bg-fade"></div>
    </div>

    <div class="nx-splash--legacy__content">
      <p class="nx-splash--legacy__brand">NEXUS</p>

      <div class="nx-splash--legacy__intro">
        <h1 class="nx-splash--legacy__headline">
          Tecnologia <em>sob medida</em>
        </h1>
        <p class="nx-splash--legacy__lead">
          Tecnologia personalizada que se adapta ao seu negócio — e não o contrário.
        </p>
      </div>

      <a href="home.html" class="nx-btn nx-btn--primary">
        Começar agora
        <span class="material-symbols-outlined" style="font-size:1rem;" aria-hidden="true">arrow_forward</span>
      </a>
    </div>
  </main>
</body>
</html>
