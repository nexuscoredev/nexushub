<!DOCTYPE html>
<html lang="pt-BR" data-theme="light" data-theme-mode="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS | Tecnologia Sob Medida</title>
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/nexus-site.css" />
  <link rel="stylesheet" href="css/nexus-apple.css" />
  <script src="js/theme.js"></script>
  <script src="js/metal.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.NexusTheme?.initButtons?.();
      window.NexusMetal?.init?.();
    });
  </script>
</head>
<body>
  <main class="nx-splash--legacy">
    <div class="nx-splash--legacy__bg" aria-hidden="true">
      <div class="nx-splash--legacy__bg-image"></div>
      <div class="nx-splash--legacy__bg-fade"></div>
      <div class="nx-splash--legacy__glow" style="top:-10%;left:-10%;width:40%;height:40%;background:var(--nx-hero-glow);"></div>
      <div class="nx-splash--legacy__glow" style="bottom:-10%;right:-10%;width:30%;height:30%;background:var(--nx-hero-glow);opacity:0.6;"></div>
    </div>

    <div class="nx-splash--legacy__content">
      <div class="nx-hud-bar" aria-hidden="true">
        <span class="nx-hud-bar__dot"></span>
        <span>SYS.INIT</span>
        <span class="nx-hud-bar__sep">|</span>
        <span>NEXUS CORE</span>
      </div>
      <h2 class="nx-splash--legacy__brand">NEXUS</h2>

      <div class="nx-chips">
        <span class="nx-chip">Visão</span>
        <span class="nx-chip">Inteligência</span>
        <span class="nx-chip">IA e Automação</span>
      </div>

      <div>
        <h1 class="nx-splash--legacy__headline">
          Tecnologia <em>Sob Medida</em>
        </h1>
        <p style="margin:0.75rem 0 0;color:var(--nx-text-muted);font-size:0.9rem;max-width:32ch;">
          Tecnologia personalizada que se adapta ao seu negócio — e não o contrário.
        </p>
      </div>

      <a href="home.html" class="nx-btn nx-btn--primary">
        Começar agora
        <span class="material-symbols-outlined" style="font-size:1rem;">arrow_forward</span>
      </a>
    </div>
  </main>
</body>
</html>
